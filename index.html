<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>ReflexZone - Test Your Reaction Speed</title>
  <meta name="description" content="Play ReflexZone and test your reaction speed. Compete with friends and improve your reflexes!">

  <!-- Google Verification -->
  <meta name="google-site-verification" content="wAN7K3mrfRAQlZc9KTtV5KvM0PPjFgDcooSQASz8akk" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1 {
      font-size: 3rem;
      margin-top: 60px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .play-btn {
      margin-top: 40px;
      padding: 15px 40px;
      font-size: 1.5rem;
      border: none;
      border-radius: 10px;
      background: #00e5ff;
      color: black;
      cursor: pointer;

      /* YOUR EFFECT */
      box-shadow: 0 0 20px #00e5ff;
      transition: 0.3s;
    }

    .play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px #00e5ff;
    }

    footer {
      margin-top: auto;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    a {
      color: #00e5ff;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .play-btn {
        font-size: 1.2rem;
        padding: 12px 30px;
      }
    }
  </style>
</head>

<body>

  <h1>⚡ ReflexZone</h1>
  <p>Test your reaction speed. How fast are you?</p>

  <button class="play-btn" onclick="startGame()">Play Now</button>

  <footer>
    Made by Abdurrahman & Abdul Azeem<br>
    📧 abdurrahmanomg15@gmail.com | azzeem987@gmail.com
  </footer>

  <script>
    function startGame() {
      window.location.href = "game.html";
    }
  </script>

</body>
</html>
