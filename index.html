<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReflexZone</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
  color:white;
  overflow:hidden;
}

/* SCREEN SYSTEM */
.screen{
  display:none;
  height:100vh;
  width:100vw;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}

.active{display:flex;}

/* BUTTONS */
button{
  padding:14px 18px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  background:#00ffcc;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

/* GAME BOX */
#gameBox{
  width:220px;
  height:220px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
  transition:0.3s;
}

/* MEMORY */
#memoryGrid{
  display:grid;
  grid-template-columns:repeat(3,90px);
  gap:12px;
  margin-top:15px;
}

.memBox{
  width:90px;
  height:90px;
  background:#222;
  border-radius:10px;
  transition:0.2s;
}

.memActive{
  background:#00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

/* TEXT */
h1{
  font-size:40px;
}

.panel{
  background:#141414;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,204,0.1);
  max-width:600px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="panel">
    <h1>ReflexZone</h1>
    <p>Reaction • Memory • Typing • Arcade</p>

    <button onclick="show('game')">Reaction Game</button>
    <button onclick="show('arcade')">Arcade 🎮</button>
  </div>
</div>

<!-- REACTION -->
<div id="game" class="screen">
  <div class="panel">
    <h2>⚡ Reaction Game</h2>
    <div id="gameBox" onclick="clickBox()">START</div>
    <p id="rank"></p>

    <button style="background:#ff5555;color:white;font-size:18px;padding:16px 22px;"
            onclick="show('home')">
      ⬅ Back to Home
    </button>
  </div>
</div>

<!-- ARCADE -->
<div id="arcade" class="screen">
  <div class="panel">
    <h2>🎮 Arcade Hub</h2>

    <button onclick="openGame('reaction')">⚡ Reaction</button>
    <button onclick="openGame('memory')">🧠 Memory</button>
    <button onclick="openGame('typing')">⌨️ Typing</button>

    <br><br>

    <button style="background:#ff5555;color:white;font-size:18px;padding:16px 22px;"
            onclick="show('home')">
      ⬅ Back to Home
    </button>
  </div>
</div>

<!-- MEMORY -->
<div id="memoryGame" class="screen">
  <div class="panel">
    <h2>🧠 Memory Game</h2>
    <p id="memoryStatus">Watch the pattern</p>

    <div id="memoryGrid"></div>

    <button onclick="startMemory()">Start</button>

    <button style="background:#ff5555;color:white;font-size:18px;padding:16px 22px;"
            onclick="show('arcade')">
      ⬅ Back
    </button>
  </div>
</div>

<!-- TYPING -->
<div id="typingGame" class="screen">
  <div class="panel">
    <h2>⌨️ Typing Challenge</h2>

    <p id="sentence"></p>
    <input id="typeInput" oninput="checkTyping()" style="padding:10px;width:90%;font-size:16px;" />
    <p id="typingResult"></p>

    <button onclick="startTyping()">New Text</button>

    <button style="background:#ff5555;color:white;font-size:18px;padding:16px 22px;"
            onclick="show('arcade')">
      ⬅ Back
    </button>
  </div>
</div>

<script>

/* SCREEN SYSTEM */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ROUTER */
function openGame(g){
  if(g==="reaction") show("game");
  if(g==="memory"){ show("memoryGame"); setupMemory(); }
  if(g==="typing") show("typingGame");
}

/* ================= REACTION ================= */
let startTime;
let waiting=false;

function clickBox(){
  if(!waiting){
    document.getElementById("gameBox").innerText="WAIT...";
    setTimeout(()=>{
      document.getElementById("gameBox").style.background="#00ffcc";
      document.getElementById("gameBox").innerText="CLICK!";
      startTime=Date.now();
      waiting=true;
    },Math.random()*2000+1000);
  } else {
    let r=Date.now()-startTime;
    waiting=false;

    document.getElementById("gameBox").style.background="#222";
    document.getElementById("gameBox").innerText="START";

    document.getElementById("rank").innerText="Reaction: "+r+"ms";
  }
}

/* ================= MEMORY ================= */
let pattern=[], player=[], canPlay=false;

function setupMemory(){
  let g=document.getElementById("memoryGrid");
  if(g.innerHTML!=="") return;

  for(let i=0;i<9;i++){
    let d=document.createElement("div");
    d.className="memBox";
    d.onclick=()=>press(i);
    g.appendChild(d);
  }
}

function startMemory(){
  pattern=[]; player=[]; canPlay=false;

  for(let i=0;i<5;i++){
    pattern.push(Math.floor(Math.random()*9));
  }

  let boxes=document.querySelectorAll(".memBox");
  let i=0;

  let interval=setInterval(()=>{
    if(i>0) boxes[pattern[i-1]].classList.remove("memActive");

    if(i>=pattern.length){
      clearInterval(interval);
      canPlay=true;
      document.getElementById("memoryStatus").innerText="Your turn!";
      return;
    }

    boxes[pattern[i]].classList.add("memActive");
    i++;
  },450);
}

function press(i){
  if(!canPlay) return;

  player.push(i);

  if(player[player.length-1] !== pattern[player.length-1]){
    document.getElementById("memoryStatus").innerText="Wrong ❌";
    canPlay=false;
  } else {
    document.getElementById("memoryStatus").innerText="Good ✔";
  }
}

/* ================= TYPING (100+ WORD TEXTS) ================= */

let sentence="";
let startTypingTime;

const texts=[
"reflexzone is a fast reaction training game designed to improve your focus speed and typing ability under pressure it helps players build better reflexes and compete with friends while enjoying arcade style mini games that challenge the brain and hand coordination",
"typing speed games are not just fun they also improve cognitive response time accuracy and concentration skills which are useful in gaming studying and real life communication tasks making them a powerful training tool for anyone who wants to get faster",
"practice is the key to mastery and every time you repeat a challenge your brain becomes faster at processing information reflexzone is built to push your limits and help you become sharper in reaction memory and typing performance over time"
];

function startTyping(){
  sentence=texts[Math.floor(Math.random()*texts.length)];
  document.getElementById("sentence").innerText=sentence;
  document.getElementById("typeInput").value="";
  document.getElementById("typingResult").innerText="";
  startTypingTime=Date.now();
}

function checkTyping(){
  let v=document.getElementById("typeInput").value;

  if(v===sentence){
    let t=(Date.now()-startTypingTime)/1000;
    let wpm=Math.round((sentence.split(" ").length/t)*60);

    document.getElementById("typingResult").innerText=
      "WPM: "+wpm+" 🔥";
  }
}

</script>

</body>
</html>
