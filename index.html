<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReflexZone</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
  color:white;
  overflow:hidden;
}

.screen{
  display:none;
  height:100vh;
  width:100vw;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}
.active{display:flex;}

button{
  padding:14px 18px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  background:#00ffcc;
  font-weight:bold;
  transition:0.2s;
}
button:hover{transform:scale(1.05);}

.panel{
  background:#141414;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,204,0.1);
  max-width:650px;
  width:90%;
}

.bigBack{
  background:#ff5555;
  color:white;
  font-size:18px;
  padding:16px 26px;
  border-radius:12px;
}

/* FIXED BOXES (NO DUPLICATES NOW) */
#box, #clickBox{
  width:220px;
  height:220px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
  margin:auto;
}

/* MEMORY */
#memoryGrid{
  display:grid;
  grid-template-columns:repeat(3,90px);
  gap:12px;
  margin-top:15px;
  justify-content:center;
}

.memBox{
  width:90px;
  height:90px;
  background:#222;
  border-radius:10px;
}

.memActive{
  background:#00ffcc;
  box-shadow:0 0 10px #00ffcc;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="panel">
    <h1>ReflexZone</h1>
    <p>Reaction • Memory • Typing • Arcade</p>

    <button onclick="show('game')">Reaction Game</button>
    <button onclick="show('arcade')">Arcade 🎮</button>
  </div>
</div>

<!-- REACTION -->
<div id="game" class="screen">
  <div class="panel">
    <h2>⚡ Reaction Game</h2>
    <div id="box" onclick="clickBox()">START</div>
    <p id="rank"></p>

    <button class="bigBack" onclick="show('home')">⬅ Back</button>
  </div>
</div>

<!-- ARCADE -->
<div id="arcade" class="screen">
  <div class="panel">
    <h2>🎮 Arcade Hub</h2>

    <button onclick="openGame('reaction')">⚡ Reaction</button>
    <button onclick="openGame('memory')">🧠 Memory</button>
    <button onclick="openGame('typing')">⌨️ Typing</button>

    <button onclick="openGame('click1')">⚡ 1s CPS</button>
    <button onclick="openGame('click5')">⚡ 5s CPS</button>

    <button class="bigBack" onclick="show('home')">⬅ Back</button>
  </div>
</div>

<!-- MEMORY -->
<div id="memoryGame" class="screen">
  <div class="panel">
    <h2>🧠 Memory Game</h2>
    <p id="memoryStatus">Watch pattern</p>

    <div id="memoryGrid"></div>

    <button onclick="startMemory()">Start</button>
    <button class="bigBack" onclick="show('arcade')">⬅ Back</button>
  </div>
</div>

<!-- TYPING -->
<div id="typingGame" class="screen">
  <div class="panel">
    <h2>⌨️ Typing Game</h2>

    <p id="sentence"></p>
    <input id="typeInput" oninput="checkTyping()" style="padding:10px;width:90%;font-size:16px;" />
    <p id="typingResult"></p>

    <button onclick="startTyping()">New Text</button>
    <button class="bigBack" onclick="show('arcade')">⬅ Back</button>
  </div>
</div>

<!-- CPS CLICKER -->
<div id="clickGame" class="screen">
  <div class="panel">
    <h2 id="clickTitle">CPS Challenge</h2>

    <div id="clickBox" onclick="countClick()">CLICK FAST!</div>

    <p id="clickInfo"></p>

    <button onclick="show('arcade')" class="bigBack">⬅ Back</button>
  </div>
</div>

<script>

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ROUTER */
let mode="";
let cpsClicks=0;
let cpsTime=0;
let cpsRunning=false;
let cpsTimer;

/* OPEN GAMES */
function openGame(g){
  if(g==="reaction") show("game");
  if(g==="memory"){ show("memoryGame"); setupMemory(); }
  if(g==="typing") show("typingGame");

  if(g==="click1") startCPS(1);
  if(g==="click5") startCPS(5);
}

/* ================= CPS CLICKER (NEW FIXED SYSTEM) ================= */

function startCPS(sec){
  show("clickGame");

  mode = sec;
  cpsClicks = 0;
  cpsRunning = true;

  document.getElementById("clickTitle").innerText =
    sec + " SECOND CPS CHALLENGE";

  document.getElementById("clickInfo").innerText =
    "Click as FAST as possible!";

  document.getElementById("clickBox").innerText = "START CLICKING!";
  document.getElementById("clickBox").style.background = "#00ffcc";

  cpsTimer = setTimeout(()=>{
    cpsRunning = false;

    let cps = (cpsClicks / sec).toFixed(2);

    document.getElementById("clickBox").style.background = "#222";
    document.getElementById("clickBox").innerText = "DONE";

    document.getElementById("clickInfo").innerText =
      "Clicks: " + cpsClicks + " | CPS: " + cps;

  }, sec * 1000);
}

function countClick(){
  if(!cpsRunning) return;
  cpsClicks++;
}

/* ================= REACTION ================= */

let startTime;
let waiting=false;

function clickBox(){
  if(!waiting){
    document.getElementById("box").innerText="WAIT...";
    setTimeout(()=>{
      document.getElementById("box").style.background="#00ffcc";
      document.getElementById("box").innerText="CLICK!";
      startTime=Date.now();
      waiting=true;
    },Math.random()*2000+1000);
  } else {
    let r=Date.now()-startTime;
    waiting=false;

    document.getElementById("box").style.background="#222";
    document.getElementById("box").innerText="START";

    document.getElementById("rank").innerText="Reaction: "+r+"ms";
  }
}

/* ================= MEMORY ================= */

let pattern=[], player=[], canPlay=false;

function setupMemory(){
  let g=document.getElementById("memoryGrid");
  if(g.innerHTML!=="") return;

  for(let i=0;i<9;i++){
    let d=document.createElement("div");
    d.className="memBox";
    d.onclick=()=>player.push(i);
    g.appendChild(d);
  }
}

function startMemory(){
  pattern=[]; player=[];

  for(let i=0;i<5;i++){
    pattern.push(Math.floor(Math.random()*9));
  }

  let boxes=document.querySelectorAll(".memBox");
  let i=0;

  let interval=setInterval(()=>{
    if(i>0) boxes[pattern[i-1]].classList.remove("memActive");

    if(i>=pattern.length){
      clearInterval(interval);
      return;
    }

    boxes[pattern[i]].classList.add("memActive");
    i++;
  },450);
}

/* ================= TYPING ================= */

const texts=[
"reflexzone trains your brain fast",
"speed matters in games",
"focus improves reaction time",
"practice makes you better",
"fast hands win fights",
"reaction speed is skill",
"typing speed is power",
"stay sharp stay fast",
"never miss timing",
"small focus big results"
];

let sentence="";
let startTypingTime;

function startTyping(){
  sentence=texts[Math.floor(Math.random()*texts.length)];
  document.getElementById("sentence").innerText=sentence;
  document.getElementById("typeInput").value="";
  document.getElementById("typingResult").innerText="";
  startTypingTime=Date.now();
}

function checkTyping(){
  let v=document.getElementById("typeInput").value;

  if(v===sentence){
    let t=(Date.now()-startTypingTime)/1000;
    let wpm=Math.round((sentence.split(" ").length/t)*60);

    document.getElementById("typingResult").innerText="WPM: "+wpm;
  }
}

</script>

</body>
</html>
