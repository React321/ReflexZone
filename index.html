<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReflexZone</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 30px;
    }

    #game {
      width: 200px;
      height: 200px;
      margin: 40px auto;
      background: red;
      cursor: pointer;
      border-radius: 10px;
    }

    /* RESULT BOX */
    #resultBox {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px black;
    }

    #resultBox h2 {
      margin: 10px 0;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    /* RANK PANEL */
    #rankPanel {
      position: fixed;
      right: 20px;
      top: 20px;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
    }

    #rankPanel h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<h1>⚡ ReflexZone</h1>
<p>Click when the box turns green</p>

<div id="game"></div>

<!-- RESULT BOX -->
<div id="resultBox">
  <h2 id="time"></h2>
  <h3 id="rank"></h3>
  <p id="message"></p>
  <button onclick="startGame()">Try Again</button>
</div>

<!-- RANK PANEL -->
<div id="rankPanel">
  <h3>Ranks</h3>
  <p>🐌 Slow</p>
  <p>⚡ Average</p>
  <p>🔥 Fast</p>
  <p>🚀 Alien</p>
</div>

<script>
let startTime;
let timeout;
let game = document.getElementById("game");

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function startGame() {
  document.getElementById("resultBox").style.display = "none";
  game.style.background = "red";

  let delay = Math.random() * 3000 + 1000;

  timeout = setTimeout(() => {
    game.style.background = "green";
    startTime = Date.now();
  }, delay);
}

game.onclick = function () {

  if (game.style.background === "red") {
    clearTimeout(timeout);
    showResult("Too early 💀", "❌ Cheater", "Bro couldn’t wait 😭");
    return;
  }

  let reaction = Date.now() - startTime;

  let rank = "";
  let message = "";

  if (reaction >= 400) {
    rank = "🐌 Slow";
    message = getRandom([
      "My grandma could’ve made tea and still beat you ☕💀",
      "Bro reacted in 4 business days 📉",
      "Even WiFi loading screens are faster",
      "You clicked after the universe moved on 😭"
    ]);

  } else if (reaction >= 250) {
    rank = "🐌 Slow";
    message = getRandom([
      "Not bad… but you’re not winning races 🐌",
      "A bit too relaxed there 😴",
      "You saw it… then thought about life",
      "Warm-up fingers detected"
    ]);

  } else if (reaction >= 150) {
    rank = "⚡ Average";
    message = getRandom([
      "Solid… but nothing special ⚡",
      "Middle of the pack energy",
      "You’re getting there",
      "Decent reflexes for a human"
    ]);

  } else if (reaction >= 80) {
    rank = "🔥 Fast";
    message = getRandom([
      "Okayyy speed demon 🔥",
      "That was actually clean",
      "Bro’s locked in 👀",
      "Blink and you win energy"
    ]);

  } else {
    rank = "🚀 Alien";
    message = getRandom([
      "ARE YOU A ROBOT?? 🤖",
      "Nah this is illegal speed 💀",
      "You saw the future",
      "Reflexes from another universe 🚀"
    ]);
  }

  showResult(reaction + " ms", rank, message);
};

function showResult(time, rank, message) {
  document.getElementById("time").innerText = time;
  document.getElementById("rank").innerText = rank;
  document.getElementById("message").innerText = message;

  document.getElementById("resultBox").style.display = "block";
}

startGame();
</script>

</body>
</html>
