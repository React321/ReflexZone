<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Reaction Arena</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #111827, #0b1220);
      color: white;
      text-align: center;

      /* ✅ FIX: full screen layout */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
    }

    .hero {
      padding: 80px 20px 40px;
    }

    .logo {
      font-size: 50px;
      font-weight: bold;
      background: linear-gradient(90deg, #00ffcc, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.8;
      margin-top: 10px;
    }

    .play-btn {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #22c55e, #06b6d4);
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.05);
    }

    .card {
      margin: 40px auto;
      width: 300px;
      padding: 20px;
      background: #111827;
      border-radius: 15px;
    }

    .feature {
      margin: 10px 0;
      opacity: 0.9;
    }

    /* ✅ FOOTER FIX */
    footer {
      margin-top: auto;
      background: #0b1220;
      padding: 15px;
      font-size: 13px;
      opacity: 0.85;
      border-top: 1px solid #1f2937;
    }
  </style>
</head>

<body>

<div class="content">

  <div class="hero">
    <div class="logo">⚡ Reaction Arena</div>
    <div class="tagline">Test your reflexes. Compete worldwide. Become #1.</div>

    <button class="play-btn" onclick="window.location.href='game.html'">
      ▶ Play Now
    </button>
  </div>

  <div class="card">
    <h3>🔥 Why people love it</h3>
    <div class="feature">⚡ Insanely fast reaction game</div>
    <div class="feature">🏆 Global leaderboard (coming soon)</div>
    <div class="feature">😈 Funny rage messages</div>
    <div class="feature">📱 Works on all devices</div>
  </div>

</div>

<!-- ✅ FOOTER -->
<footer>
  Made by <b>Abdurrahman & Abdul Azeem</b><br>
  Emails: abdurrahmanomg15@gmail.com | azzeem987@gmail.com
</footer>

</body>
</html>
