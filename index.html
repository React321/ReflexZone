<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReflexZone</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
}

.screen{
  display:none;
  height:100vh;
  width:100vw;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
.active{display:flex;}

button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

#gameBox{
  width:200px;
  height:200px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
}

#memoryGrid{
  display:grid;
  grid-template-columns:repeat(3,80px);
  gap:10px;
  margin-top:10px;
}

.memBox{
  width:80px;
  height:80px;
  background:#222;
  border-radius:8px;
}

.memActive{background:#00ffcc;}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>ReflexZone</h1>
  <button onclick="show('game')">Reaction</button>
  <button onclick="show('arcade')">Arcade 🎮</button>
</div>

<!-- REACTION GAME -->
<div id="game" class="screen">
  <div id="gameBox" onclick="clickBox()">START</div>
  <p id="rank"></p>
  <button onclick="show('home')">Back</button>
</div>

<!-- ARCADE -->
<div id="arcade" class="screen">
  <h2>Arcade</h2>
  <button onclick="openGame('memory')">Memory</button>
  <button onclick="openGame('typing')">Typing</button>
  <button onclick="openGame('reaction')">Reaction</button>
  <button onclick="show('home')">Back</button>
</div>

<!-- MEMORY -->
<div id="memory" class="screen">
  <h2>Memory Game</h2>
  <p id="memText"></p>
  <div id="memoryGrid"></div>
  <button onclick="startMemory()">Start</button>
</div>

<!-- TYPING -->
<div id="typing" class="screen">
  <h2>Typing Game</h2>
  <p id="sentence"></p>
  <input id="input" oninput="checkTyping()"/>
  <p id="result"></p>
  <button onclick="startTyping()">Start</button>
</div>

<script>

/* SCREEN SYSTEM */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* OPEN ARCADE GAMES */
function openGame(g){
  if(g==="memory"){
    show("memory");
    setupMemory();
  }
  if(g==="typing") show("typing");
  if(g==="reaction") show("game");
}

/* ================= REACTION ================= */

let startTime;
let waiting=false;

function clickBox(){
  if(!waiting){
    document.getElementById("gameBox").innerText="WAIT...";
    setTimeout(()=>{
      document.getElementById("gameBox").style.background="green";
      document.getElementById("gameBox").innerText="CLICK!";
      startTime=Date.now();
      waiting=true;
    },Math.random()*2000+800);
  } else {
    let r=Date.now()-startTime;
    waiting=false;

    document.getElementById("gameBox").style.background="#222";
    document.getElementById("gameBox").innerText="START";

    document.getElementById("rank").innerText=r+" ms";
  }
}

/* ================= MEMORY ================= */

let pattern=[], player=[], canPlay=false;

function setupMemory(){
  let grid=document.getElementById("memoryGrid");
  grid.innerHTML="";

  for(let i=0;i<9;i++){
    let d=document.createElement("div");
    d.className="memBox";
    d.onclick=()=>press(i);
    grid.appendChild(d);
  }
}

function startMemory(){
  pattern=[];
  player=[];
  canPlay=false;

  for(let i=0;i<4;i++){
    pattern.push(Math.floor(Math.random()*9));
  }

  let boxes=document.querySelectorAll(".memBox");
  let i=0;

  let interval=setInterval(()=>{
    if(i>0) boxes[pattern[i-1]].classList.remove("memActive");

    if(i>=pattern.length){
      clearInterval(interval);
      canPlay=true;
      document.getElementById("memText").innerText="Your turn";
      return;
    }

    boxes[pattern[i]].classList.add("memActive");
    i++;
  },500);
}

function press(i){
  if(!canPlay) return;

  player.push(i);

  if(player[player.length-1] !== pattern[player.length-1]){
    document.getElementById("memText").innerText="Wrong ❌";
    canPlay=false;
  }
}

/* ================= TYPING ================= */

let sentence="";
let start;

function startTyping(){
  let list=["reflexzone is fun","fast reaction wins","practice daily"];
  sentence=list[Math.floor(Math.random()*list.length)];
  document.getElementById("sentence").innerText=sentence;
  document.getElementById("input").value="";
  start=Date.now();
}

function checkTyping(){
  let v=document.getElementById("input").value;
  if(v===sentence){
    let t=(Date.now()-start)/1000;
    let wpm=Math.round(sentence.split(" ").length/t*60);
    document.getElementById("result").innerText="WPM: "+wpm;
  }
}

</script>

</body>
</html>
