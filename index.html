<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- 🔥 FAVICON (put favicon.png in same folder as index.html) -->
<link rel="icon" type="image/png" href="favicon.png" />

<meta name="google-site-verification" content="wAN7K3mrfRAQlZc9KTtV5KvM0PPjFgDcooSQASz8akk" />

<title>ReflexZone</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
}

body.neon{background:#050014;color:#00ffcc;}
body.rainbow{
  background:linear-gradient(45deg,#ff00cc,#3333ff,#00ffcc);
  background-size:400% 400%;
  animation:move 6s infinite linear;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.screen{
  display:none;
  height:100vh;
  width:100vw;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
.active{display:flex;}

button{
  padding:10px 16px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#gameBox{
  width:200px;
  height:200px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  user-select:none;
}

#topBar{
  position:absolute;
  top:10px;
  left:10px;
  color:#00ffcc;
  font-weight:bold;
}

.shop-item{
  background:#1a1a1a;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

#msgBox{
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px;
  border-radius:8px;
  display:none;
}

#creators{
  position:absolute;
  bottom:10px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div id="topBar">💰 Coins: <span id="coins">0</span></div>
<div id="creators">Creators: Abdurrahman & Abdul Aze</div>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>ReflexZone</h1>
  <button onclick="show('game')">Play</button>
  <button onclick="show('shop')">Shop</button>
  <button onclick="show('credits')">Credits</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="gameBox" onclick="play()">TRY NOW</div>
  <p id="rank">Rank: -</p>
  <p id="best">Best: none</p>
  <button onclick="show('home')">Back</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
  <h2>Shop</h2>
  <div class="shop-item" onclick="buy('neon',100)">Neon Theme - 100</div>
  <div class="shop-item" onclick="buy('rainbow',200)">Rainbow Theme - 200</div>
  <button onclick="show('home')">Back</button>
</div>

<!-- CREDITS -->
<div id="credits" class="screen">
  <h2>Credits</h2>
  <p>Made by Abdurrahman & Abdul Aze</p>
  <button onclick="show('home')">Back</button>
</div>

<div id="msgBox"></div>

<script>
let coins = Number(localStorage.getItem("coins")) || 0;
let best = JSON.parse(localStorage.getItem("best")) || [];
let owned = JSON.parse(localStorage.getItem("owned")) || [];
let start = 0;
let waiting = false;

const messages = {
  alien:["not human 💀","BRO WHAT","AI???"],
  fast:["fast af ⚡","clean","cracked"],
  normal:["ok 👍","average","not bad"],
  slow:["too slow 🐌","bro??","wake up"]
};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function update(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("best").innerText = best.length ? "Best: " + best[0] + "ms" : "Best: none";
}

function play(){
  if(!waiting){
    document.getElementById("gameBox").innerText="WAIT...";
    setTimeout(()=>{
      document.getElementById("gameBox").innerText="CLICK!";
      document.getElementById("gameBox").style.background="green";
      start = Date.now();
      waiting = true;
    }, Math.random()*3000+1000);
  } else {
    let r = Date.now() - start;
    waiting = false;

    document.getElementById("gameBox").innerText="TRY AGAIN";
    document.getElementById("gameBox").style.background="#222";

    let type = r<200?"alien":r<250?"fast":r<450?"normal":"slow";
    let msg = messages[type][Math.floor(Math.random()*messages[type].length)];

    coins += Math.max(1, Math.floor(1000/r));
    best.push(r);
    best.sort((a,b)=>a-b);

    localStorage.setItem("coins",coins);
    localStorage.setItem("best",JSON.stringify(best));

    document.getElementById("rank").innerText = `Rank: ${type.toUpperCase()} (${r}ms) - ${msg}`;

    update();
  }
}

function buy(item,cost){
  if(coins < cost) return alert("Not enough coins!");

  coins -= cost;
  owned.push(item);

  if(item === "neon") document.body.classList.add("neon");
  if(item === "rainbow") document.body.classList.add("rainbow");

  localStorage.setItem("coins",coins);
  localStorage.setItem("owned",JSON.stringify(owned));

  update();
}

// restore themes
if(owned.includes("neon")) document.body.classList.add("neon");
if(owned.includes("rainbow")) document.body.classList.add("rainbow");

update();
</script>

</body>
</html>
