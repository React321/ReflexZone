<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Reaction Arena</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #111827, #0b1220);
      color: white;
      text-align: center;
    }

    .hero {
      padding: 80px 20px 40px;
    }

    .logo {
      font-size: 50px;
      font-weight: bold;
      background: linear-gradient(90deg, #00ffcc, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.8;
      margin-top: 10px;
    }

    .play-btn {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #22c55e, #06b6d4);
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.05);
    }

    .card {
      margin: 40px auto;
      width: 300px;
      padding: 20px;
      background: #111827;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .feature {
      margin: 10px 0;
      opacity: 0.9;
    }

    footer {
      margin-top: 60px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo">⚡ Reaction Arena</div>
    <div class="tagline">Test your reflexes. Compete worldwide. Become #1.</div>
    
    <button class="play-btn" onclick="location.href='index.html'">
      ▶ Play Now
    </button>
  </div>

  <div class="card">
    <h3>🔥 Why people love it</h3>
    <div class="feature">⚡ Insanely fast reaction game</div>
    <div class="feature">🏆 Global leaderboard</div>
    <div class="feature">😈 Funny rage messages</div>
    <div class="feature">📱 Works on all devices</div>
  </div>

  <footer>
    Made for competitive players • Reaction Arena
  </footer>

</body>
</html>
