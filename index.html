<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reaction Arena</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
    }

    .hero {
      padding: 80px 20px 40px;
    }

    .logo {
      font-size: 50px;
      font-weight: bold;
      color: #00e5ff;
      text-shadow: 0 0 20px #00e5ff;
    }

    .tagline {
      margin-top: 10px;
      opacity: 0.8;
    }

    /* 🔥 YOUR GLOW BUTTON (ADDED) */
    .play-btn {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #22c55e, #06b6d4);
      color: black;
      font-weight: bold;

      box-shadow: 0 0 20px #00e5ff;
      transition: 0.3s;
    }

    .play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px #00e5ff;
    }

    .card {
      margin: 40px auto;
      width: 300px;
      padding: 20px;
      background: #111827;
      border-radius: 15px;
    }

    .feature {
      margin: 10px 0;
      opacity: 0.9;
    }

    footer {
      margin-top: auto;
      background: #0b1220;
      padding: 15px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="content">

  <div class="hero">
    <div class="logo">⚡ Reaction Arena</div>

    <div class="tagline">
      Only 1% can react under 150ms 😈
    </div>

    <button class="play-btn" onclick="window.location.href='game.html'">
      ▶ Play Now
    </button>
  </div>

  <div class="card">
    <h3>🔥 Why Play?</h3>
    <div class="feature">⚡ Insane reaction challenge</div>
    <div class="feature">🏆 Compete globally</div>
    <div class="feature">😈 Beat your friends</div>
  </div>

  <div class="card">
    <h3>👨‍💻 Creators</h3>
    <div class="feature">Abdurrahman - abdurrahmanomg15@gmail.com</div>
    <div class="feature">Abdul Azeem - azzeem987@gmail.com</div>
  </div>

</div>

<footer>
  Made with ❤️ by Abdurrahman & Abdul Azeem
</footer>

</body>
</html>
