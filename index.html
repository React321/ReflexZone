<!DOCTYPE html>
<html>
<head>
  <title>ReflexZone</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #gameBox {
      margin: 100px auto;
      width: 300px;
      height: 200px;
      background: red;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      cursor: pointer;
      font-size: 20px;
    }

    #leaderboard {
      position: fixed;
      right: 20px;
      top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      width: 220px;
      text-align: left;
    }

    input {
      padding: 8px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<h1>⚡ ReflexZone</h1>

<input id="username" placeholder="Enter name">

<div id="gameBox">Click to start</div>

<div id="result"></div>

<div id="leaderboard">
  <h3>🏆 Global</h3>
  <div id="scores">Loading...</div>
</div>

<script>
/* ================== SUPABASE ================== */
const SUPABASE_URL = "lishugsxdskcbciwzbia.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpc2h1Z3N4ZHNrY2JjaXd6YmlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTI2MzEsImV4cCI6MjA5MzU2ODYzMX0.7rdwPZqj-l9wV4-5SmDvEcDNjiI_gTzcQE4QLO4tIcM";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================== GAME ================== */
let startTime, waiting = false;

const box = document.getElementById("gameBox");

box.addEventListener("click", async () => {
  if (!waiting) {
    box.style.background = "red";
    box.innerText = "Wait...";

    let delay = Math.random() * 3000 + 2000;
    waiting = true;

    setTimeout(() => {
      box.style.background = "green";
      box.innerText = "CLICK!";
      startTime = Date.now();
    }, delay);

  } else {
    let time = Date.now() - startTime;

    box.style.background = "red";
    box.innerText = "Click to try again";
    waiting = false;

    showResult(time);
    await handleScore(time);
  }
});

/* ================== FUNNY TEXT ================== */
function getMessage(ms) {
  if (ms < 120) return "⚡ Are you human?!";
  if (ms < 180) return "🔥 Insane reflexes!";
  if (ms < 250) return "😎 Pretty fast!";
  if (ms < 350) return "🙂 Not bad!";
  return "🐢 My grandma faster than you 💀";
}

/* ================== RESULT ================== */
function showResult(ms) {
  document.getElementById("result").innerHTML =
    `⏱ ${ms} ms <br> ${getMessage(ms)}`;
}

/* ================== COUNTRY ================== */
async function getCountry() {
  try {
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();
    return data.country_code;
  } catch {
    return "US";
  }
}

/* ================== FLAG ================== */
function getFlag(code) {
  return code
    .toUpperCase()
    .replace(/./g, c =>
      String.fromCodePoint(127397 + c.charCodeAt())
    );
}

/* ================== SUBMIT ================== */
async function handleScore(time) {
  if (time < 50) return; // anti-cheat

  let name = document.getElementById("username").value || "Player";
  let country = await getCountry();

  await supabase.from("leaderboard").insert([
    { name: name, time: time, country: country }
  ]);

  loadLeaderboard();
}

/* ================== LOAD LEADERBOARD ================== */
async function loadLeaderboard() {
  const { data } = await supabase
    .from("leaderboard")
    .select("*")
    .order("time", { ascending: true })
    .limit(10);

  let html = "";
  let rank = 1;

  data.forEach(player => {
    html += `${rank}. ${getFlag(player.country)} ${player.name} — ${player.time}ms<br>`;
    rank++;
  });

  document.getElementById("scores").innerHTML = html;
}

loadLeaderboard();

</script>

</body>
</html>
