<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google-site-verification" content="wAN7K3mrfRAQlZc9KTtV5KvM0PPjFgDcooSQASz8akk" />
<title>ReflexZone</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  overflow: hidden;
  transition: 0.3s;
}

body.neon { background:#050014; color:#00ffcc; }
body.rainbow {
  background: linear-gradient(45deg,#ff00cc,#3333ff,#00ffcc);
  background-size:400% 400%;
  animation: move 6s infinite linear;
}

@keyframes move {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.screen {
  display: none;
  height: 100vh;
  width: 100vw;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.active { display:flex; }

button {
  padding:10px 16px;
  font-size:15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:5px;
}

#gameBox {
  width:200px;
  height:200px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  text-align:center;
}

.rank { margin-top:10px; font-size:18px; color:#ffcc00; }

#topBar{
  position:absolute;
  top:10px;
  left:10px;
  color:#00ffcc;
  font-weight:bold;
}

/* MEMORY */
#memoryGrid{
  display:grid;
  grid-template-columns:repeat(3,80px);
  gap:10px;
  margin-top:15px;
}
.memBox{
  width:80px;
  height:80px;
  background:#222;
  border-radius:10px;
}
.memActive{ background:#00ffcc !important; }

/* TYPING */
#typeInput{
  padding:10px;
  margin-top:10px;
  width:250px;
}
</style>
</head>

<body>

<div id="topBar">💰 Coins: <span id="coinCount">0</span></div>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>ReflexZone</h1>

  <button onclick="showScreen('game')">Play</button>
  <button onclick="showScreen('shop')">Shop</button>

  <button onclick="showScreen('arcade')">Arcade 🎮</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="gameBox" onclick="clickBox()">TRY NOW</div>
  <div class="rank" id="rank">Rank: -</div>
  <button onclick="showScreen('home')">Back</button>
</div>

<!-- ARCADE -->
<div id="arcade" class="screen">
  <h2>🎮 ReflexZone Arcade</h2>

  <button onclick="openGame('reaction')">⚡ Reaction</button>
  <button onclick="openGame('memory')">🧠 Memory</button>
  <button onclick="openGame('typing')">⌨️ Typing</button>

  <br><br>
  <button onclick="showScreen('home')">Back</button>
</div>

<!-- MEMORY -->
<div id="memoryGame" class="screen">
  <h2>🧠 Memory Game</h2>
  <p id="memoryStatus">Start game</p>
  <div id="memoryGrid"></div>
  <button onclick="startMemory()">Start</button>
</div>

<!-- TYPING -->
<div id="typingGame" class="screen">
  <h2>⌨️ Typing Game</h2>
  <p id="sentence"></p>
  <input id="typeInput" oninput="checkTyping()" />
  <p id="typingResult"></p>
  <button onclick="startTyping()">Start</button>
</div>

<script>

/* ================= CORE ================= */

let coins = 0;
let startTime;
let waiting=false;

function updateCoins(){
  document.getElementById("coinCount").innerText = coins;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= GAME ================= */

function clickBox(){
  if(!waiting){
    document.getElementById("gameBox").innerText="WAIT...";
    setTimeout(()=>{
      document.getElementById("gameBox").style.background="green";
      document.getElementById("gameBox").innerText="CLICK!";
      startTime=Date.now();
      waiting=true;
    },Math.random()*2000+800);
  } else {
    let r = Date.now()-startTime;
    waiting=false;

    document.getElementById("gameBox").style.background="#222";
    document.getElementById("gameBox").innerText="TRY AGAIN";

    coins += Math.max(1,Math.floor(1000/r));

    document.getElementById("rank").innerText = "Reaction: "+r+"ms";

    updateCoins();
  }
}

/* ================= ARCADE ================= */

function openGame(g){
  if(g==="reaction") showScreen("game");
  if(g==="memory"){
    showScreen("memoryGame");
    setupMemory();
  }
  if(g==="typing") showScreen("typingGame");
}

/* ================= MEMORY GAME ================= */

let pattern=[], player=[], canPlay=false;

function setupMemory(){
  let g=document.getElementById("memoryGrid");
  g.innerHTML="";
  for(let i=0;i<9;i++){
    let d=document.createElement("div");
    d.className="memBox";
    d.onclick=()=>press(i);
    g.appendChild(d);
  }
}

function startMemory(){
  pattern=[];
  player=[];
  canPlay=false;

  for(let i=0;i<4;i++){
    pattern.push(Math.floor(Math.random()*9));
  }

  let boxes=document.querySelectorAll(".memBox");
  let i=0;

  let interval=setInterval(()=>{
    if(i>0) boxes[pattern[i-1]].classList.remove("memActive");

    if(i>=pattern.length){
      clearInterval(interval);
      canPlay=true;
      return;
    }

    boxes[pattern[i]].classList.add("memActive");
    i++;
  },500);
}

function press(i){
  if(!canPlay) return;
  player.push(i);

  if(player[player.length-1] !== pattern[player.length-1]){
    alert("Wrong ❌");
    canPlay=false;
  }
}

/* ================= TYPING ================= */

let sentence="", startTyping;

const sentences=[
  "reflexzone is fun",
  "fast reactions win games",
  "practice makes perfect"
];

function startTyping(){
  sentence = sentences[Math.floor(Math.random()*sentences.length)];
  document.getElementById("sentence").innerText=sentence;
  document.getElementById("typeInput").value="";
  startTyping=Date.now();
}

function checkTyping(){
  let v=document.getElementById("typeInput").value;
  if(v===sentence){
    let time=(Date.now()-startTyping)/1000;
    let wpm=Math.round(sentence.split(" ").length/time*60);
    document.getElementById("typingResult").innerText="WPM: "+wpm;
  }
}

updateCoins();

</script>

</body>
</html>
