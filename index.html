<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

////////////////////////////////////////////////////
// 🔑 SUPABASE INIT (SAFE GUARD)
////////////////////////////////////////////////////
const SUPABASE_URL = "YOUR_URL_HERE";
const SUPABASE_KEY = "YOUR_KEY_HERE";

let supabaseClient;

if (window.supabase && !window.__supabaseReady) {
  window.__supabaseReady = true;

  supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );
}

////////////////////////////////////////////////////
// 🎮 GAME STATE
////////////////////////////////////////////////////
let startTime = 0;
let waiting = false;

const box = document.getElementById("gameBox");

////////////////////////////////////////////////////
// 🎮 CLICK GAME
////////////////////////////////////////////////////
box.addEventListener("click", async () => {
  try {

    if (!waiting) {

      box.innerText = "Wait...";
      box.style.background = "red";
      waiting = true;

      let delay = Math.random() * 3000 + 1500;

      setTimeout(() => {
        box.innerText = "CLICK!";
        box.style.background = "green";
        startTime = Date.now();
      }, delay);

    } else {

      let time = Date.now() - startTime;

      box.innerText = "Click to try again";
      box.style.background = "red";
      waiting = false;

      showResult(time);

      await saveScore(time);
    }

  } catch (err) {
    console.log("Game error:", err);
  }
});

////////////////////////////////////////////////////
// 🧠 RESULT TEXT
////////////////////////////////////////////////////
function getMessage(ms) {
  const messages = [
    "⚡ NOT HUMAN!",
    "🔥 INSANE!",
    "😎 GOOD!",
    "🙂 AVERAGE",
    "🐌 GRANDMA FASTER 💀"
  ];

  if (ms < 120) return messages[0];
  if (ms < 180) return messages[1];
  if (ms < 250) return messages[2];
  if (ms < 350) return messages[3];
  return messages[4];
}

function showResult(ms) {
  document.getElementById("result").innerHTML =
    `⏱ ${ms}ms<br>${getMessage(ms)}`;
}

////////////////////////////////////////////////////
// 🏆 SAVE BEST SCORE ONLY (SAFE)
////////////////////////////////////////////////////
async function saveScore(time) {

  if (!supabaseClient) return;

  if (time < 50) return;

  let name = document.getElementById("username").value || "Player";

  try {

    let { data } = await supabaseClient
      .from("Leaderboard")
      .select("*")
      .eq("name", name)
      .maybeSingle();

    if (!data) {
      await supabaseClient.from("Leaderboard").insert([
        { name, time }
      ]);
    } else if (time < data.time) {
      await supabaseClient
        .from("Leaderboard")
        .update({ time })
        .eq("name", name);
    }

    loadLeaderboard();

  } catch (e) {
    console.log("DB error:", e);
  }
}

////////////////////////////////////////////////////
// 🏆 LOAD LEADERBOARD (SAFE)
////////////////////////////////////////////////////
async function loadLeaderboard() {

  if (!supabaseClient) return;

  try {

    const { data, error } = await supabaseClient
      .from("Leaderboard")
      .select("*")
      .order("time", { ascending: true })
      .limit(10);

    if (error) {
      document.getElementById("scores").innerHTML = "Leaderboard error";
      console.log(error);
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById("scores").innerHTML = "No scores yet";
      return;
    }

    let html = "";
    let rank = 1;

    data.forEach(p => {
      html += `${rank}. ${p.name} — ${p.time}ms<br>`;
      rank++;
    });

    document.getElementById("scores").innerHTML = html;

  } catch (e) {
    console.log("Load error:", e);
  }
}

loadLeaderboard();

</script>
