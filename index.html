<!DOCTYPE html>
<html>
<head>
  <title>ReflexZone</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #gameBox {
      margin: 60px auto;
      width: 300px;
      height: 200px;
      background: red;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      cursor: pointer;
      font-size: 20px;
      user-select: none;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    #leaderboard {
      position: fixed;
      right: 20px;
      top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      width: 240px;
      text-align: left;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>⚡ ReflexZone</h1>

<input id="username" placeholder="Username">
<input id="country" placeholder="Country code (AE, US)">

<div id="gameBox">Click to start</div>

<div id="result"></div>

<div id="leaderboard">
  <h3>🏆 Global Leaderboard</h3>
  <div id="scores">Loading...</div>
</div>

<script>

////////////////////////////////////////////////////
// 🔥 SUPABASE SETUP (PASTE YOUR KEYS)
////////////////////////////////////////////////////
const SUPABASE_URL = "lishugsxdskcbciwzbia.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpc2h1Z3N4ZHNrY2JjaXd6YmlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTI2MzEsImV4cCI6MjA5MzU2ODYzMX0.7rdwPZqj-l9wV4-5SmDvEcDNjiI_gTzcQE4QLO4tIcM";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

////////////////////////////////////////////////////
// GAME STATE
////////////////////////////////////////////////////
let startTime;
let waiting = false;

const box = document.getElementById("gameBox");

////////////////////////////////////////////////////
// START GAME
////////////////////////////////////////////////////
box.addEventListener("click", async () => {

  if (!waiting) {
    box.style.background = "red";
    box.innerText = "Wait...";

    let delay = Math.random() * 3000 + 2000;
    waiting = true;

    setTimeout(() => {
      box.style.background = "green";
      box.innerText = "CLICK!";
      startTime = Date.now();
    }, delay);

  } else {

    let time = Date.now() - startTime;

    box.style.background = "red";
    box.innerText = "Click to try again";
    waiting = false;

    showResult(time);
    await handleScore(time);
  }
});

////////////////////////////////////////////////////
// FUNNY MESSAGES
////////////////////////////////////////////////////
function getMessage(ms) {
  if (ms < 120) return "⚡ INSANE reflexes!";
  if (ms < 180) return "🔥 Very fast!";
  if (ms < 250) return "😎 Good job!";
  if (ms < 350) return "🙂 Average";
  return "🐌 My grandma faster than you 💀";
}

////////////////////////////////////////////////////
// SHOW RESULT
////////////////////////////////////////////////////
function showResult(ms) {
  document.getElementById("result").innerHTML =
    `⏱ ${ms} ms<br>${getMessage(ms)}`;
}

////////////////////////////////////////////////////
// COUNTRY FLAGS
////////////////////////////////////////////////////
function getFlag(code) {
  if (!code) return "🌍";
  return code.toUpperCase().replace(/./g, c =>
    String.fromCodePoint(127397 + c.charCodeAt())
  );
}

////////////////////////////////////////////////////
// GET COUNTRY AUTO
////////////////////////////////////////////////////
async function getCountry() {
  try {
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();
    return data.country_code;
  } catch {
    return "US";
  }
}

////////////////////////////////////////////////////
// 🧠 MAIN LOGIC (BEST SCORE ONLY)
////////////////////////////////////////////////////
async function handleScore(time) {

  if (time < 50) return; // anti-cheat

  let name = document.getElementById("username").value || "Player";
  let country = await getCountry();

  // check if player exists
  let { data } = await supabase
    .from("leaderboard")
    .select("*")
    .eq("name", name)
    .maybeSingle();

  if (!data) {
    // first time player
    await supabase.from("leaderboard").insert([
      { name, time, country }
    ]);

  } else {
    // only update if better score
    if (time < data.time) {
      await supabase
        .from("leaderboard")
        .update({ time, country })
        .eq("name", name);
    }
  }

  loadLeaderboard();
}

////////////////////////////////////////////////////
// 🏆 LOAD LEADERBOARD
////////////////////////////////////////////////////
async function loadLeaderboard() {

  const { data } = await supabase
    .from("leaderboard")
    .select("*")
    .order("time", { ascending: true })
    .limit(10);

  let html = "";
  let rank = 1;

  data.forEach(p => {
    html += `${rank}. ${getFlag(p.country)} ${p.name} — ${p.time}ms<br>`;
    rank++;
  });

  document.getElementById("scores").innerHTML = html;
}

loadLeaderboard();

</script>

</body>
</html>
