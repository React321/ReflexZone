<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reaction Arena</title>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    #gameBox {
      margin: 60px auto;
      width: 300px;
      height: 200px;
      background: red;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      cursor: pointer;
      font-size: 20px;
      user-select: none;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
    }

    #rank {
      margin-top: 10px;
      font-size: 18px;
      color: #38bdf8;
    }

    .back {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #1f2937;
      color: white;
    }

    .back:hover {
      background: #374151;
    }
  </style>
</head>

<body>

<h1>⚡ Reaction Arena</h1>

<div id="gameBox">Click to start</div>

<div id="result"></div>
<div id="rank"></div>

<button class="back" onclick="window.location.href='index.html'">
  ⬅ Back
</button>

<script>

let startTime = 0;
let waiting = false;

const box = document.getElementById("gameBox");

box.addEventListener("click", () => {

  if (!waiting) {

    box.innerText = "Wait...";
    box.style.background = "red";
    waiting = true;

    let delay = Math.random() * 3000 + 1500;

    setTimeout(() => {
      box.innerText = "CLICK!";
      box.style.background = "green";
      startTime = Date.now();
    }, delay);

  } else {

    let time = Date.now() - startTime;

    box.innerText = "Click to try again";
    box.style.background = "red";
    waiting = false;

    showResult(time);
  }
});

////////////////////////////////////////////////////
// 🧠 RANK SYSTEM
////////////////////////////////////////////////////
function getRank(ms) {
  if (ms < 120) return "👽 ALIEN";
  if (ms < 160) return "⚡ LEGEND";
  if (ms < 200) return "🔥 PRO";
  if (ms < 260) return "😎 SKILLED";
  if (ms < 350) return "🙂 BRONZE";
  return "🐌 NOOB";
}

function showResult(ms) {
  document.getElementById("result").innerHTML =
    `⏱ ${ms} ms`;

  document.getElementById("rank").innerHTML =
    `🏆 Rank: <b>${getRank(ms)}</b>`;
}

</script>

</body>
</html>
