<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReflexZone Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: black;
  color: white;
}

#gameBox {
  width: 90%;
  max-width: 400px;
  height: 300px;
  margin: 40px auto;
  background: green;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 10px;
}

button {
  padding: 10px 20px;
  margin: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#shop {
  display: none;
  background: #111;
  padding: 20px;
  border-radius: 10px;
  margin: 20px;
}
</style>
</head>

<body>

<h1>⚡ ReflexZone</h1>

<p id="rank">Rank: Beginner</p>
<p id="coins">Coins: 0</p>

<div id="gameBox">Click to Start</div>

<button onclick="toggleShop()">🛒 Shop</button>

<div id="shop">
  <h2>Shop</h2>

  <h3>Themes</h3>
  <button onclick="buyTheme('red',50)">🔴 Red (50)</button>
  <button onclick="buyTheme('blue',50)">🔵 Blue (50)</button>
  <button onclick="buyTheme('purple',75)">🟣 Purple (75)</button>
  <button onclick="buyTheme('yellow',75)">🟡 Yellow (75)</button>
  <button onclick="buyTheme('cyan',100)">💎 Neon Cyan (100)</button>

  <h3>Upgrades</h3>
  <button onclick="buyRank(100)">👑 Pro Rank (100)</button>
</div>

<script>
let startTime;
let waiting = false;

let coins = parseInt(localStorage.getItem("coins")) || 0;
let theme = localStorage.getItem("theme") || "green";
let rank = localStorage.getItem("rank") || "Beginner";

updateUI();

const box = document.getElementById("gameBox");

box.onclick = () => {
  if (!waiting) {
    box.style.background = "red";
    box.innerText = "Wait...";
    waiting = true;

    let delay = Math.random() * 2000 + 1000;

    setTimeout(() => {
      box.style.background = theme;
      box.innerText = "CLICK!";
      startTime = Date.now();
    }, delay);

  } else {
    if (!startTime) {
      box.innerText = "Too Early!";
      reset();
      return;
    }

    let reaction = Date.now() - startTime;
    let earned = getCoins(reaction);

    coins += earned;

    box.innerText = reaction + " ms (+ " + earned + " coins)";
    updateRank(reaction);
    save();
    updateUI();

    reset();
  }
};

function reset() {
  waiting = false;
  startTime = null;

  setTimeout(() => {
    box.style.background = theme;
    box.innerText = "Click to Start";
  }, 1500);
}

function getCoins(ms) {
  if (ms < 200) return 10;
  if (ms < 300) return 7;
  if (ms < 400) return 5;
  return 2;
}

function updateRank(ms) {
  if (ms < 200) rank = "GOD 👑";
  else if (ms < 300) rank = "Pro";
  else if (ms < 400) rank = "Fast";
  else rank = "Average";
}

function updateUI() {
  document.getElementById("coins").innerText = "Coins: " + coins;
  document.getElementById("rank").innerText = "Rank: " + rank;
}

function save() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("theme", theme);
  localStorage.setItem("rank", rank);
}

function toggleShop() {
  let shop = document.getElementById("shop");
  shop.style.display = shop.style.display === "none" ? "block" : "none";
}

function buyTheme(color, price) {
  if (coins >= price) {
    coins -= price;
    theme = color;
    save();
    updateUI();
    alert("Theme unlocked!");
  } else {
    alert("Not enough coins!");
  }
}

function buyRank(price) {
  if (coins >= price) {
    coins -= price;
    rank = "Pro 👑";
    save();
    updateUI();
    alert("Rank upgraded!");
  } else {
    alert("Not enough coins!");
  }
}
</script>

</body>
</html>
