<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reaction Arena</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      overflow: hidden;

      /* 🌌 NEON BACKGROUND */
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0ea5e9, #111827);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-top: 20px;
      text-shadow: 0 0 10px #00e5ff;
    }

    #gameBox {
      margin: 50px auto 20px;
      width: 300px;
      height: 200px;
      background: rgba(255,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      cursor: pointer;
      font-size: 20px;
      user-select: none;

      box-shadow: 0 0 20px #00e5ff;
    }

    #result, #rank {
      margin-top: 10px;
      font-size: 18px;
      text-shadow: 0 0 8px black;
    }

    .back {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #1f2937;
      color: white;
    }

    .back:hover {
      background: #374151;
    }

    /* 🏆 leaderboard (optional) */
    #leaderboard {
      position: fixed;
      right: 10px;
      top: 10px;
      width: 180px;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      text-align: left;
      backdrop-filter: blur(5px);
    }
  </style>
</head>

<body>

<h1>⚡ Reaction Arena</h1>

<div id="gameBox">Click to start</div>

<div id="result"></div>
<div id="rank"></div>

<button class="back" onclick="window.location.href='index.html'">
  ⬅ Back
</button>

<!-- 🏆 OPTIONAL LEADERBOARD BOX -->
<div id="leaderboard">
  🏆 Leaderboard<br>
  <small>(optional)</small>
  <div id="scores">Not connected</div>
</div>

<script>

////////////////////////////////////////////////////
// 🎵 SOUND ENGINE (NO FILES NEEDED)
////////////////////////////////////////////////////
function beep(type = "click") {
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  if (type === "click") {
    o.frequency.value = 200;
  } else {
    o.frequency.value = 600;
  }

  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
  o.stop(ctx.currentTime + 0.2);
}

////////////////////////////////////////////////////
// 🎮 GAME
////////////////////////////////////////////////////
let startTime = 0;
let waiting = false;

const box = document.getElementById("gameBox");

box.addEventListener("click", () => {

  beep("click");

  if (!waiting) {

    box.innerText = "Wait...";
    waiting = true;

    let delay = Math.random() * 3000 + 1500;

    setTimeout(() => {
      box.innerText = "CLICK!";
      box.style.background = "rgba(0,255,150,0.8)";
      startTime = Date.now();
    }, delay);

  } else {

    let time = Date.now() - startTime;

    box.innerText = "Click to try again";
    box.style.background = "rgba(255,0,0,0.8)";
    waiting = false;

    beep("success");
    showResult(time);
  }
});

////////////////////////////////////////////////////
// 🧠 RANK SYSTEM
////////////////////////////////////////////////////
function getRank(ms) {
  if (ms < 120) return "👽 ALIEN";
  if (ms < 160) return "⚡ LEGEND";
  if (ms < 200) return "🔥 PRO";
  if (ms < 260) return "😎 SKILLED";
  if (ms < 350) return "🙂 BRONZE";
  return "🐌 NOOB";
}

function getMessage(ms) {
  if (ms < 120) return "⚡ GOD MODE";
  if (ms < 180) return "🔥 INSANE";
  if (ms < 250) return "😎 GOOD";
  if (ms < 350) return "🙂 AVERAGE";
  return "🐌 Grandma faster than you 💀";
}

function showResult(ms) {
  document.getElementById("result").innerHTML =
    `⏱ ${ms} ms<br>${getMessage(ms)}`;

  document.getElementById("rank").innerHTML =
    `🏆 Rank: <b>${getRank(ms)}</b>`;
}

////////////////////////////////////////////////////
// 🏆 OPTIONAL LEADERBOARD (SAFE OFF BY DEFAULT)
////////////////////////////////////////////////////
// If you want Supabase later, I’ll plug it in cleanly.
// For now it stays OFF so NOTHING breaks.

</script>

</body>
</html>
