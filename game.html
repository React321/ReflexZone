<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reaction Arena</title>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #gameBox {
      margin: 40px auto 20px;
      width: 90%;
      max-width: 320px;
      height: 180px;
      background: red;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }

    #result, #rank {
      font-size: 16px;
      margin-top: 10px;
      padding: 0 10px;
    }

    .back {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #1f2937;
      color: white;
    }

    .back:hover {
      background: #374151;
    }
  </style>
</head>

<body>

<h1>⚡ Reaction Arena</h1>

<div id="gameBox">Click to start</div>

<div id="result"></div>
<div id="rank"></div>

<button class="back" onclick="window.location.href='index.html'">
  ⬅ Back
</button>

<script>

////////////////////////////////////////////////////
// 🎮 GAME STATE
////////////////////////////////////////////////////
let startTime = 0;
let waiting = false;

const box = document.getElementById("gameBox");

////////////////////////////////////////////////////
// 🏆 LOCAL LEADERBOARD
////////////////////////////////////////////////////
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

////////////////////////////////////////////////////
// 🎮 GAME LOGIC
////////////////////////////////////////////////////
box.addEventListener("click", () => {

  if (!waiting) {

    box.innerText = "Wait...";
    box.style.background = "red";
    waiting = true;

    setTimeout(() => {
      box.innerText = "CLICK!";
      box.style.background = "green";
      startTime = Date.now();
    }, Math.random() * 3000 + 1500);

  } else {

    let time = Date.now() - startTime;

    box.innerText = "Click to try again";
    box.style.background = "red";
    waiting = false;

    showResult(time);
  }
});

////////////////////////////////////////////////////
// ⚡ FUNNY TEXTS
////////////////////////////////////////////////////
function getMessage(ms) {
  if (ms < 120) return "⚡ NOT HUMAN!";
  if (ms < 180) return "🔥 INSANE!";
  if (ms < 250) return "😎 GOOD!";
  if (ms < 350) return "🙂 AVERAGE!";
  return "🐌 Grandma faster than you 💀";
}

////////////////////////////////////////////////////
// 🏆 RANK SYSTEM
////////////////////////////////////////////////////
function getRank(ms) {
  if (ms < 120) return "👽 ALIEN";
  if (ms < 160) return "⚡ LEGEND";
  if (ms < 200) return "🔥 PRO";
  if (ms < 260) return "😎 SKILLED";
  if (ms < 350) return "🙂 BRONZE";
  return "🐌 NOOB";
}

////////////////////////////////////////////////////
// 📊 SHOW RESULT + SAVE SCORE
////////////////////////////////////////////////////
function showResult(ms) {

  document.getElementById("result").innerHTML =
    `⏱ ${ms} ms<br>${getMessage(ms)}`;

  document.getElementById("rank").innerHTML =
    `🏆 Rank: <b>${getRank(ms)}</b>`;

  // 🏆 SAVE TO LOCAL LEADERBOARD
  leaderboard.push(ms);
  leaderboard.sort((a, b) => a - b);
  leaderboard = leaderboard.slice(0, 5);

  localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

  showLeaderboard();
}

////////////////////////////////////////////////////
// 🏆 SHOW LEADERBOARD
////////////////////////////////////////////////////
function showLeaderboard() {

  let html = "🏆 Top Scores:<br><br>";

  leaderboard.forEach((score, i) => {
    html += `${i + 1}. ${score} ms<br>`;
  });

  document.getElementById("result").innerHTML +=
    "<br><br>" + html;
}

</script>

</body>
</html>
